<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON CORE 2026 | Palm AR</title>
    <style>
        :root { --neon: #00ff88; --glass: rgba(0, 0, 0, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; transform: scaleX(-1); }

        .interface {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom));
        }
        .top-nav { display: flex; justify-content: space-between; pointer-events: auto; }
        .glass-btn {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.3); color: var(--neon);
            padding: 12px 22px; border-radius: 16px; font-size: 12px; font-weight: bold;
            transition: 0.3s; cursor: pointer;
        }
        .glass-btn:active { transform: scale(0.9); background: var(--neon); color: #000; }

        #status-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: auto;
            transition: 0.5s;
        }
        #task-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: var(--neon); color: #000; padding: 20px 40px; border-radius: 50px;
            font-weight: 900; border: none; box-shadow: 0 0 50px var(--neon);
            pointer-events: auto; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; z-index: 300;
        }
        #task-btn.show { display: block; transform: translate(-50%, -50%) scale(1); }

        #loading {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon);
        }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(0,255,136,0.2); border-top: 2px solid var(--neon); border-radius: 50%; animation: s 1s linear infinite; margin-bottom: 20px; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="loading">
        <div class="spinner"></div>
        <div style="letter-spacing: 4px; font-size: 10px;">SYNCING BIOMETRICS...</div>
    </div>

    <div class="interface">
        <div class="top-nav">
            <button class="glass-btn" onclick="location.reload()">REBOOT ⟳</button>
            <button class="glass-btn" id="muteBtn">AUDIO ON</button>
        </div>

        <button id="task-btn" onclick="window.open('https://t.me/lessa2332', '_blank')">ВІДКРИТИ ПОРТАЛ</button>

        <div id="status-card">
            <div id="status-text" style="color: var(--neon); font-size: 14px;">ПОКАЖІТЬ ДОЛОНЬ</div>
            <div style="font-size: 8px; color: rgba(255,255,255,0.4); margin-top: 5px;">WEB-AR CORE v2.6 • ENCRYPTED</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Spatial Audio Setup
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const spatialSound = new THREE.PositionalAudio(listener);
        const audioLoader = new THREE.AudioLoader();

        // Основна група AR-об'єкта
        const arGroup = new THREE.Group();
        scene.add(arGroup);

        // --- 1. НЕОНОВЕ ЯДРО (Кристал у долоні) ---
        const coreGeo = new THREE.OctahedronGeometry(0.12, 0);
        const coreMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 2, wireframe: true 
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        arGroup.add(core);

        const innerGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.04, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.7 })
        );
        core.add(innerGlow);
        core.add(spatialSound); // Прив'язуємо звук до ядра

        // --- 2. ГОЛОГРАМА ---
        const holoVideo = document.createElement('video');
        holoVideo.src = 'assets/video/guide_hologram.mp4';
        holoVideo.loop = false; holoVideo.crossOrigin = "anonymous";

        const holoTex = new THREE.VideoTexture(holoVideo);
        const holoMat = new THREE.MeshBasicMaterial({ map: holoTex, transparent: true, opacity: 0, side: THREE.DoubleSide });
        const holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.6), holoMat);
        holoPlane.position.y = 0.4;
        holoPlane.scale.set(0,0,0);
        arGroup.add(holoPlane);

        // --- MEDIAPIPE & CAMERA ---
        let handLandmarker;
        const video = document.getElementById('video');
        let isActivated = false;
        let smoothPos = { x: 0, y: 0, z: 0 };

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                document.getElementById('loading').style.display = 'none';
                render();
            };
        }

        function render() {
            if (handLandmarker && video.readyState >= 2) {
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks[0]) {
                    const lm = results.landmarks[0];
                    
                    // Обчислення центру долоні (Wrist + Middle Finger Base + Pinky Base)
                    const centerX = (lm[0].x + lm[5].x + lm[17].x) / 3;
                    const centerY = (lm[0].y + lm[5].y + lm[17].y) / 3;
                    const centerZ = (lm[0].z + lm[5].z + lm[17].z) / 3;

                    // Згладжування 2026
                    smoothPos.x += ( (centerX - 0.5) * 3 - smoothPos.x ) * 0.2;
                    smoothPos.y += ( (0.5 - centerY) * 2 - smoothPos.y ) * 0.2;
                    
                    arGroup.position.set(smoothPos.x, smoothPos.y, centerZ * 2);
                    arGroup.visible = true;

                    // Детекція кулака
                    const isFist = lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y;
                    if (isFist && !isActivated) activate();

                } else {
                    arGroup.visible = false;
                }
            }

            // Анімація ядра
            core.rotation.y += 0.02;
            core.rotation.x += 0.01;
            
            if (isActivated && holoMat.opacity < 1) {
                holoMat.opacity += 0.04;
                const s = Math.min(holoPlane.scale.x + 0.05, 1);
                holoPlane.scale.set(s, s, s);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        function activate() {
            isActivated = true;
            holoVideo.play();
            if (navigator.vibrate) navigator.vibrate([40, 30, 100]);
            document.getElementById('status-text').innerText = "CORE СИНХРОНІЗОВАНО";
            document.getElementById('status-card').style.borderColor = "var(--neon)";
            
            holoVideo.onended = () => {
                document.getElementById('task-btn').classList.add('show');
            };
        }

        // Ввімкнення звуку через взаємодію (вимога браузерів)
        document.getElementById('muteBtn').onclick = (e) => {
            if (listener.context.state === 'suspended') listener.context.resume();
            e.target.innerText = "AUDIO READY";
            e.target.style.background = "var(--neon)";
            e.target.style.color = "#000";
        };

        init();
    </script>
</body>
</html>
