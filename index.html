<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | ДІАГНОСТИКА</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: monospace; background: black; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #info, #gesture-status, button { z-index: 100; position: absolute; }
        #info { top: 20px; left: 20px; right: 20px; background: rgba(0,20,0,0.85); color: #0f0; padding: 12px; border-radius: 20px; text-align: center; border: 1px solid #0f0; }
        #gesture-status { bottom: 30px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #ffdd88; padding: 10px; border-radius: 20px; text-align: center; border: 1px solid #ffaa33; }
        button { bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); border: 2px solid #0f0; color: #0f0; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        #sound-btn { bottom: 80px; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #0f0; }
        .spinner { width: 50px; height: 50px; border: 3px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-log { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; padding: 8px; font-size: 10px; z-index: 200; border-radius: 8px; display: none; max-height: 150px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">ЗАВАНТАЖЕННЯ...</div>
        <div style="font-size:12px; margin-top:10px;">НЕОН-БРАСЛЕТ</div>
    </div>
    <div id="info">⚡ НЕОН-БРАСЛЕТ | МАТРИЦЯ КОДУ ⚡<br>✊ Стисни кулак – активуй голограму</div>
    <div id="gesture-status">👋 Розкрий долоню → стисни в кулак</div>
    <button id="reset-btn">⟳ СКИНУТИ</button>
    <button id="sound-btn">🔇 ЗВУК</button>
    <div id="error-log"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        // Перехоплення помилок
        window.onerror = (msg, url, line, col, error) => {
            const logDiv = document.getElementById('error-log');
            logDiv.style.display = 'block';
            logDiv.innerHTML += `[ERROR] ${msg}<br>`;
            console.error(msg, error);
        };
        
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        const CONFIG = {
            braceletColor: 0x00ff88,
            glowColor: 0x44ffaa,
            rotationSpeed: 0.025,
            handOffsetY: 0.05,
            handOffsetZ: 0.03,
            hologramOffsetY: 0.22,
            hologramScale: 0.35,
            neonIntensity: 1.2,
            symbolCount: 16
        };

        const ukrSymbols = ['Є', 'Ї', 'Ґ', 'Щ', 'Ь', 'К', 'О', 'Д', '0', '1', '#', '{', '}', '<', '>', '⚡', '⌨️', '₴', '💻', '🔮', '☯', '∇', '∫', 'π'];

        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        
        function logError(msg) {
            const logDiv = document.getElementById('error-log');
            logDiv.style.display = 'block';
            logDiv.innerHTML += `⚠️ ${msg}<br>`;
            console.error(msg);
        }

        // Three.js
        const scene = new THREE.Scene();
        scene.background = null;
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        
        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);
        
        // --- Спрощене створення браслета (для надійності) ---
        const ringGeo = new THREE.TorusGeometry(0.13, 0.022, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x44ffaa, emissiveIntensity: 1.2 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        braceletGroup.add(ring);
        
        const glowRingGeo = new THREE.TorusGeometry(0.145, 0.006, 64, 200);
        const glowRingMat = new THREE.MeshStandardMaterial({ color: 0x88ffaa, emissive: 0x88ff88, emissiveIntensity: 1.2 });
        const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
        braceletGroup.add(glowRing);
        
        // Символи
        const symbolGroup = new THREE.Group();
        braceletGroup.add(symbolGroup);
        function createSymbolTexture(char, color = '#0f0') {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 128;
            const ctx = c.getContext('2d');
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.font = `bold 80px monospace`;
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, c.width/2, c.height/2);
            return new THREE.CanvasTexture(c);
        }
        for (let i = 0; i < CONFIG.symbolCount; i++) {
            const char = ukrSymbols[i % ukrSymbols.length];
            const tex = createSymbolTexture(char, '#0f0');
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending });
            const sprite = new THREE.Sprite(mat);
            const angle = (i / CONFIG.symbolCount) * Math.PI * 2;
            sprite.position.set(Math.cos(angle) * 0.19, 0, Math.sin(angle) * 0.19);
            sprite.scale.set(0.055, 0.055, 1);
            symbolGroup.add(sprite);
        }
        
        const neonLight = new THREE.PointLight(0x44ff88, 1.2, 2.5);
        braceletGroup.add(neonLight);
        
        // Голограма (спрощена, без відео якщо немає)
        const hologramPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(CONFIG.hologramScale, CONFIG.hologramScale * 0.75),
            new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5 })
        );
        hologramPlane.position.y = CONFIG.hologramOffsetY;
        braceletGroup.add(hologramPlane);
        
        let handLandmarker;
        let isFist = false;
        
        async function initHandTracking() {
            loadingText.innerText = 'ЗАВАНТАЖЕННЯ MEDIAPIPE...';
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                loadingText.innerText = 'MEDIAPIPE ГОТОВО';
                return true;
            } catch(e) {
                logError("Помилка MediaPipe: "+e.message);
                loadingText.innerText = 'ПОМИЛКА MEDIAPIPE';
                return false;
            }
        }
        
        function detectFist(landmarks) {
            if (!landmarks) return false;
            const fingers = [8, 12, 16, 20];
            let curled = 0;
            for (let tip of fingers) {
                if (landmarks[tip].y > landmarks[tip-2].y + 0.02) curled++;
            }
            return curled >= 3;
        }
        
        async function startCamera() {
            loadingText.innerText = 'ЗАПУСК КАМЕРИ...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoEl.srcObject = stream;
                await videoEl.play();
                loadingText.innerText = 'КАМЕРА ПРАЦЮЄ';
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                }, 1000);
                return true;
            } catch (err) {
                logError("Помилка камери: "+err.message);
                loadingText.innerText = 'ПОМИЛКА КАМЕРИ';
                document.getElementById('gesture-status').innerHTML = '❌ НЕМАЄ ДОСТУПУ ДО КАМЕРИ. ПЕРЕВІРТЕ ДОЗВОЛИ.';
                return false;
            }
        }
        
        function detectLoop() {
            if (!handLandmarker || videoEl.readyState < 2 || !videoEl.videoWidth) {
                requestAnimationFrame(detectLoop);
                return;
            }
            try {
                const results = handLandmarker.detectForVideo(videoEl, performance.now());
                const statusDiv = document.getElementById('gesture-status');
                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    const fistNow = detectFist(landmarks);
                    if (fistNow !== isFist) {
                        isFist = fistNow;
                        if (isFist) {
                            statusDiv.innerHTML = '✊ КУЛАК | БРАСЛЕТ АКТИВОВАНО';
                            braceletGroup.visible = true;
                            if (navigator.vibrate) navigator.vibrate(100);
                        } else {
                            statusDiv.innerHTML = '👋 РОЗТИСНИ КУЛАК';
                            braceletGroup.visible = false;
                        }
                    }
                    if (isFist && braceletGroup.visible) {
                        const wrist = landmarks[0];
                        const x = (wrist.x - 0.5) * 4.5;
                        const y = (0.5 - wrist.y) * 3.2 + CONFIG.handOffsetY;
                        const z = (wrist.z || 0) * 1.5 + CONFIG.handOffsetZ;
                        braceletGroup.position.x += (x - braceletGroup.position.x) * 0.6;
                        braceletGroup.position.y += (y - braceletGroup.position.y) * 0.6;
                        braceletGroup.position.z = z;
                    }
                } else {
                    if (isFist) statusDiv.innerHTML = '🖐️ РУКА ЗНИКЛА';
                }
            } catch(e) {
                logError("detectLoop error: "+e.message);
            }
            requestAnimationFrame(detectLoop);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            if (braceletGroup.visible) {
                ring.rotation.y += CONFIG.rotationSpeed;
                glowRing.rotation.y -= CONFIG.rotationSpeed * 0.7;
                symbolGroup.rotation.y += 0.02;
                neonLight.intensity = 0.9 + Math.sin(now * 8) * 0.5;
                ringMat.emissiveIntensity = 0.8 + Math.sin(now * 5) * 0.4;
            }
            renderer.render(scene, camera);
        }
        
        document.getElementById('reset-btn').addEventListener('click', () => {
            isFist = false;
            braceletGroup.visible = false;
            document.getElementById('gesture-status').innerHTML = '👋 СКИНУТО';
        });
        
        document.getElementById('sound-btn').addEventListener('click', () => {
            // просто для інтерфейсу
            alert('Звук голограми поки що не налаштовано');
        });
        
        async function init() {
            const handOk = await initHandTracking();
            const camOk = await startCamera();
            if (!camOk) {
                // Якщо камера не працює, все одно показуємо браслет тестово
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                }, 3000);
            }
            braceletGroup.visible = false;
            animate();
            detectLoop();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        init().catch(e => {
            logError("Загальна помилка: "+e.message);
            loadingText.innerText = 'ПОМИЛКА ЗАПУСКУ';
        });
    </script>
</body>
</html>
