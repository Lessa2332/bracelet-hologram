<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | ЧИСТА ВЕРСІЯ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 10px; z-index: 100;
            color: #0f0; text-align: center; font-size: 14px;
            border: 1px solid #0f0;
        }
        #status { color: #ffdd88; margin-bottom: 5px; }
        button {
            background: rgba(0,0,0,0.7); border: 2px solid #0f0; color: #0f0;
            padding: 8px 16px; border-radius: 40px; cursor: pointer;
            font-weight: bold; font-family: monospace;
        }
        #reset { position: absolute; bottom: 20px; right: 20px; z-index: 200; }
        #camera-toggle { position: absolute; bottom: 20px; left: 20px; z-index: 200; }
        #play-video { position: absolute; top: 20px; right: 20px; z-index: 200; display: none; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            color: #0f0; font-size: 1.2rem;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="loading">
        <div class="spinner"></div>
        <div>ЗАВАНТАЖЕННЯ...</div>
    </div>
    <div id="ui">
        <div id="status">👋 Покажіть долоню</div>
        <div>✊ Стисніть кулак → голограма</div>
    </div>
    <button id="reset">⟳ Скинути</button>
    <button id="camera-toggle">📷 Змінити камеру</button>
    <button id="play-video">🎬 Запустити відео</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        // === НАЛАШТУВАННЯ ===
        const CONFIG = {
            braceletBaseRadius: 0.18,
            braceletTube: 0.028,
            handOffsetY: 0.02,
            hologramOffsetY: 0.25,
            hologramScale: 0.9,
            rotationSpeed: 0.001,   // майже нерухоме
            glowIdle: 0.3,
            glowActive: 1.2
        };

        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingDiv = document.getElementById('loading');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('reset');
        const cameraToggleBtn = document.getElementById('camera-toggle');
        const playVideoBtn = document.getElementById('play-video');

        // ---- Three.js сцена ----
        const scene = new THREE.Scene();
        scene.background = null;
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.2);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);

        // ---- БРАСЛЕТ: два напівкільця (дуги) без символів ----
        // Внутрішнє кільце
        const innerRingGeo = new THREE.TorusGeometry(
            CONFIG.braceletBaseRadius - 0.008, 
            CONFIG.braceletTube * 0.8, 
            64, 
            72, 
            Math.PI * 0.7
        );
        const innerRingMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            emissive: 0x44ff88, 
            emissiveIntensity: CONFIG.glowIdle,
            metalness: 0.8,
            transparent: true,
            opacity: 0.95,
            depthWrite: false
        });
        const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
        braceletGroup.add(innerRing);

        // Зовнішнє кільце (тонше)
        const outerRingGeo = new THREE.TorusGeometry(
            CONFIG.braceletBaseRadius + 0.008, 
            0.008, 
            64, 
            72, 
            Math.PI * 0.7
        );
        const outerRingMat = new THREE.MeshStandardMaterial({ 
            color: 0x88ffaa, 
            emissive: 0x88ff88, 
            emissiveIntensity: 0.6, 
            transparent: true, 
            opacity: 0.9, 
            depthWrite: false 
        });
        const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
        braceletGroup.add(outerRing);

        // Світло
        const pointLight = new THREE.PointLight(0x44ff88, CONFIG.glowIdle, 2);
        braceletGroup.add(pointLight);

        // ---- ГОЛОГРАМА З ВІДЕО ТА ХРОМАКЕЄМ ----
        const hologramGroup = new THREE.Group();
        braceletGroup.add(hologramGroup);
        
        const hologramVideo = document.createElement('video');
        hologramVideo.setAttribute('loop', '');
        hologramVideo.setAttribute('playsinline', '');
        hologramVideo.muted = false;   // зі звуком
        hologramVideo.src = 'assets/video/guide_hologram.mp4';
        hologramVideo.load();
        
        const videoTexture = new THREE.VideoTexture(hologramVideo);
        videoTexture.minFilter = THREE.LinearFilter;
        
        // Шейдер хромакею (HSV)
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const fragmentShader = `
            uniform sampler2D uVideo;
            uniform float uTime;
            varying vec2 vUv;
            void main() {
                vec4 color = texture2D(uVideo, vUv);
                float r = color.r, g = color.g, b = color.b;
                float maxRGB = max(r, max(g, b));
                float minRGB = min(r, min(g, b));
                float delta = maxRGB - minRGB;
                float hue = 0.0;
                if (delta != 0.0) {
                    if (maxRGB == r) hue = 60.0 * (mod((g - b) / delta, 6.0));
                    else if (maxRGB == g) hue = 60.0 * ((b - r) / delta + 2.0);
                    else hue = 60.0 * ((r - g) / delta + 4.0);
                }
                float saturation = (maxRGB == 0.0) ? 0.0 : delta / maxRGB;
                float value = maxRGB;
                bool isGreen = (hue > 75.0 && hue < 145.0 && saturation > 0.25 && value > 0.15);
                float alpha = isGreen ? 0.0 : 1.0;
                if (alpha < 0.05) discard;
                float noise = fract(sin(vUv.x * 800.0 + vUv.y * 600.0 + uTime * 10.0) * 43758.5453);
                vec3 hologramColor = vec3(0.2, 0.9, 0.2);
                vec3 finalColor = mix(color.rgb, hologramColor, 0.4);
                finalColor += noise * 0.2;
                float scanline = sin(vUv.y * 600.0 + uTime * 15.0) * 0.15;
                finalColor += scanline;
                gl_FragColor = vec4(finalColor, alpha * 0.9);
            }
        `;
        
        const hologramMaterial = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTexture }, uTime: { value: 0 } },
            vertexShader, fragmentShader, transparent: true, side: THREE.DoubleSide, depthWrite: false
        });
        
        const hologramPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(CONFIG.hologramScale, CONFIG.hologramScale * 0.75),
            hologramMaterial
        );
        hologramPlane.position.y = CONFIG.hologramOffsetY;
        hologramGroup.add(hologramPlane);
        
        // Оновлення пропорцій після завантаження відео
        hologramVideo.addEventListener('loadedmetadata', () => {
            const aspect = hologramVideo.videoWidth / hologramVideo.videoHeight;
            const newWidth = CONFIG.hologramScale;
            const newHeight = newWidth / aspect;
            hologramPlane.scale.set(newWidth, newHeight, 1);
        });
        
        // Спроба автовідтворення, якщо заблоковано – показуємо кнопку
        let videoPlayAttempted = false;
        function tryPlayVideo() {
            hologramVideo.play().then(() => {
                playVideoBtn.style.display = 'none';
                videoPlayAttempted = true;
            }).catch(e => {
                console.warn("Автовідтворення заблоковано:", e);
                playVideoBtn.style.display = 'block';
            });
        }
        hologramVideo.addEventListener('canplay', tryPlayVideo);
        playVideoBtn.onclick = () => {
            hologramVideo.play().catch(e => console.error(e));
            playVideoBtn.style.display = 'none';
        };
        
        hologramGroup.visible = false;
        let hologramActive = false;      // чи активована голограма кулаком
        let handVisible = false;
        let fistState = false;
        let lastFistState = false;
        
        // Декоративні частинки навколо голограми (замість букв)
        const particlesGroup = new THREE.Group();
        hologramGroup.add(particlesGroup);
        const particleCount = 20;
        for (let i = 0; i < particleCount; i++) {
            const geom = new THREE.SphereGeometry(0.008, 6, 6);
            const mat = new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x88ff88, emissiveIntensity: 0.5 });
            const particle = new THREE.Mesh(geom, mat);
            particle.userData = { angle: (i / particleCount) * Math.PI * 2, radius: 0.6, speed: 0.3 + Math.random() * 0.5 };
            particlesGroup.add(particle);
        }
        
        // ---- РОЗПІЗНАВАННЯ РУКИ (MediaPipe) ----
        let handLandmarker = null;
        let currentFacingMode = 'environment';
        
        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO",
                numHands: 1
            });
        }
        
        function getWristWidth(landmarks) {
            const p0 = landmarks[0], p17 = landmarks[17];
            const dx = p0.x - p17.x, dy = p0.y - p17.y, dz = (p0.z||0) - (p17.z||0);
            return Math.sqrt(dx*dx + dy*dy + dz*dz) * 5.5;
        }
        
        async function startCamera() {
            try {
                if (videoEl.srcObject) {
                    videoEl.srcObject.getTracks().forEach(t => t.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoEl.srcObject = stream;
                await videoEl.play();
                videoEl.onloadedmetadata = () => {
                    const aspect = videoEl.videoWidth / videoEl.videoHeight;
                    camera.aspect = aspect;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                return true;
            } catch(e) {
                console.error("Camera error:", e);
                statusDiv.innerHTML = '❌ Помилка камери. Спробуйте іншу.';
                return false;
            }
        }
        
        // Основний цикл
        function detectionLoop() {
            if (!handLandmarker || videoEl.readyState < 2 || !videoEl.videoWidth) {
                requestAnimationFrame(detectionLoop);
                return;
            }
            const results = handLandmarker.detectForVideo(videoEl, performance.now());
            if (results.landmarks && results.landmarks.length > 0) {
                const lm = results.landmarks[0];
                if (!handVisible) {
                    handVisible = true;
                    statusDiv.innerHTML = '🖐️ Рука виявлена! Браслет активовано.';
                }
                // Центр зап'ястя
                const wristCenter = {
                    x: (lm[0].x + lm[17].x) / 2,
                    y: (lm[0].y + lm[17].y) / 2,
                    z: ((lm[0].z||0) + (lm[17].z||0)) / 2
                };
                const targetX = (wristCenter.x - 0.5) * 2.6;
                const targetY = (0.5 - wristCenter.y) * 2.0 + CONFIG.handOffsetY;
                const targetZ = (wristCenter.z||0) * 0.6 + 0.08;
                braceletGroup.position.x += (targetX - braceletGroup.position.x) * 0.12;
                braceletGroup.position.y += (targetY - braceletGroup.position.y) * 0.12;
                braceletGroup.position.z = targetZ;
                
                const width = getWristWidth(lm);
                let scale = Math.min(Math.max(width / CONFIG.braceletBaseRadius, 0.7), 1.5);
                innerRing.scale.set(scale, scale, scale);
                outerRing.scale.set(scale, scale, scale);
                
                // Визначення кулака
                const fingers = [8,12,16,20];
                let curled = 0;
                for (let tip of fingers) if (lm[tip].y > lm[tip-2].y + 0.02) curled++;
                fistState = curled >= 3;
                
                // Активуємо голограму тільки в момент стискання (і якщо ще не активована)
                if (fistState && !lastFistState && !hologramActive) {
                    hologramActive = true;
                    hologramGroup.visible = true;
                    statusDiv.innerHTML += ' | ✨ ГОЛОГРАМА АКТИВОВАНА ✨';
                    if (navigator.vibrate) navigator.vibrate(100);
                    // Якщо відео ще не грає – запускаємо
                    if (hologramVideo.paused) tryPlayVideo();
                }
                // Якщо розтиснули – голограма залишається, але ми не ховаємо її (вона залишається видимою, поки рука в кадрі)
                // Але якщо рука зникне – вона сховається, а при новій появі потрібен новий кулак.
                // Тому не скидаємо hologramActive при розтисканні, але при зникненні руки – скинемо.
                lastFistState = fistState;
                braceletGroup.visible = true;
            } else {
                if (handVisible) {
                    handVisible = false;
                    statusDiv.innerHTML = '👋 Рука зникла... Покажіть знову для браслета.';
                    braceletGroup.visible = false;
                    hologramGroup.visible = false;
                    hologramActive = false;   // скидаємо, щоб наступного разу треба було знову стиснути кулак
                    lastFistState = false;
                }
            }
            requestAnimationFrame(detectionLoop);
        }
        
        // Анімація
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            if (braceletGroup.visible) {
                innerRing.rotation.y += CONFIG.rotationSpeed;
                outerRing.rotation.y -= CONFIG.rotationSpeed * 0.8;
                const targetGlow = hologramActive ? CONFIG.glowActive : CONFIG.glowIdle;
                innerRingMat.emissiveIntensity += (targetGlow - innerRingMat.emissiveIntensity) * 0.08;
                pointLight.intensity = innerRingMat.emissiveIntensity * 0.9;
            }
            if (hologramGroup.visible && hologramMaterial.uniforms) {
                hologramMaterial.uniforms.uTime.value = now;
                videoTexture.needsUpdate = true;
                // Анімація частинок
                particlesGroup.children.forEach((p, idx) => {
                    const angle = now * p.userData.speed + p.userData.angle;
                    p.position.x = Math.cos(angle) * p.userData.radius;
                    p.position.z = Math.sin(angle) * p.userData.radius;
                    p.position.y = Math.sin(angle * 2) * 0.05;
                });
            }
            renderer.render(scene, camera);
        }
        
        // Перемикання камери
        cameraToggleBtn.onclick = async () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            await startCamera();
        };
        
        // Скидання
        resetBtn.onclick = () => {
            handVisible = false;
            braceletGroup.visible = false;
            hologramGroup.visible = false;
            hologramActive = false;
            lastFistState = false;
            statusDiv.innerHTML = '👋 Скинуто. Покажіть руку → стисніть кулак.';
            // Відео не зупиняємо, але ховаємо
        };
        
        // Запуск
        async function init() {
            await initMediaPipe();
            await startCamera();
            braceletGroup.visible = false;
            animate();
            detectionLoop();
            loadingDiv.style.display = 'none';
        }
        init().catch(e => console.error(e));
    </script>
</body>
</html>
