<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | КОД ПРИРОДИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Courier New', 'Fira Code', monospace;
            background: #000000;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: contrast(1.05) brightness(1.02);
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            font-size: clamp(12px, 4vw, 16px);
            letter-spacing: 1px;
        }
        #gesture-status {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #ffdd88;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            font-family: monospace;
            font-size: clamp(12px, 3.5vw, 14px);
            border: 1px solid #ffaa33;
        }
        button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #0f0;
            color: #0f0;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 200;
            font-weight: bold;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        #sound-btn {
            bottom: 80px;
            right: 20px;
        }
        button:active {
            background: #0f0;
            color: black;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #0f0;
            font-family: monospace;
            font-size: 1.5rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #0f0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #0f0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            #info { top: 10px; }
            #gesture-status { bottom: 10px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>ЗАВАНТАЖЕННЯ МАТРИЦІ...</div>
        <div style="font-size:12px; margin-top:10px;">⌨️ НЕОН-БРАСЛЕТ | КОД ПРИРОДИ</div>
    </div>
    
    <div id="info">
        ⚡ НЕОН-БРАСЛЕТ | МАТРИЦЯ КОДУ ⚡<br>
        <span>✊ Стисни кулак – активуй голограму</span>
    </div>
    <div id="gesture-status">👋 Розкрий долоню → стисни в кулак</div>
    <button id="reset-btn">⟳ СКИНУТИ</button>
    <button id="sound-btn">🔇 ЗВУК</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        // === НАЛАШТУВАННЯ НЕОНУ ===
        const CONFIG = {
            braceletColor: 0x00ff88,
            glowColor: 0x44ffaa,
            rotationSpeed: 0.025,
            handOffsetY: 0.05,
            handOffsetZ: 0.03,
            hologramOffsetY: 0.22,
            hologramScale: 0.35,
            neonIntensity: 1.2,
            symbolCount: 16
        };

        // Українські символи + код
        const ukrSymbols = [
            'Є', 'Ї', 'Ґ', 'Щ', 'Ь', 'К', 'О', 'Д', 
            '0', '1', '#', '{', '}', '<', '>', '⚡', 
            '⌨️', '₴', '💻', '🔮', '☯', '∇', '∫', 'π'
        ];

        // === ОТРИМУЄМО ЕЛЕМЕНТИ ===
        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingDiv = document.getElementById('loading');
        
        // === Three.js сцена ===
        const scene = new THREE.Scene();
        scene.background = null;
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        
        // === БРАСЛЕТ-ГРУПА ===
        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);
        
        // ---- НЕОНОВЕ КІЛЬЦЕ (основне) ----
        const ringGeo = new THREE.TorusGeometry(0.13, 0.022, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: CONFIG.braceletColor, 
            emissive: CONFIG.glowColor, 
            emissiveIntensity: CONFIG.neonIntensity, 
            metalness: 0.9,
            roughness: 0.2
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        braceletGroup.add(ring);
        
        // ---- ДОДАТКОВЕ ТОНКЕ КІЛЬЦЕ (пульсуюче) ----
        const glowRingGeo = new THREE.TorusGeometry(0.145, 0.006, 64, 200);
        const glowRingMat = new THREE.MeshStandardMaterial({ color: 0x88ffaa, emissive: 0x88ff88, emissiveIntensity: 1.2 });
        const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
        braceletGroup.add(glowRing);
        
        // ---- СИМВОЛИ КОДУ (обертаються навколо) ----
        const symbolGroup = new THREE.Group();
        braceletGroup.add(symbolGroup);
        
        // Створюємо текстури для символів
        function createSymbolTexture(char, color = '#00ffcc') {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${Math.floor(canvas.width * 0.7)}px 'Courier New', monospace`;
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, canvas.width/2, canvas.height/2);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }
        
        const symbols = [];
        const radius = 0.19;
        for (let i = 0; i < CONFIG.symbolCount; i++) {
            const char = ukrSymbols[i % ukrSymbols.length];
            const texture = createSymbolTexture(char, '#0f0');
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
            const sprite = new THREE.Sprite(material);
            const angle = (i / CONFIG.symbolCount) * Math.PI * 2;
            sprite.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            sprite.scale.set(0.055, 0.055, 1);
            symbolGroup.add(sprite);
            symbols.push(sprite);
        }
        
        // ---- ЧАСТИНКИ "МАТРИЦЯ" (падаючі символи) ----
        const matrixParticles = [];
        const particleCount = 60;
        for (let i = 0; i < particleCount; i++) {
            const char = ukrSymbols[Math.floor(Math.random() * ukrSymbols.length)];
            const texture = createSymbolTexture(char, '#88ff88');
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const particle = new THREE.Sprite(material);
            particle.userData = {
                speedY: 0.005 + Math.random() * 0.015,
                radius: 0.22 + Math.random() * 0.08,
                angle: Math.random() * Math.PI * 2,
                yOffset: Math.random() * 0.5
            };
            particle.scale.set(0.035, 0.035, 1);
            braceletGroup.add(particle);
            matrixParticles.push(particle);
        }
        
        // ---- ДОДАТКОВЕ СВІТЛО ----
        const neonLight = new THREE.PointLight(0x44ff88, 1.0, 2.5);
        neonLight.intensity = 1.2;
        braceletGroup.add(neonLight);
        
        // ---- ДРУГЕ КІЛЬЦЕ З ЦИФРАМИ (для ефекту коду) ----
        const codeRingGeo = new THREE.TorusGeometry(0.16, 0.008, 48, 120);
        const codeRingMat = new THREE.MeshStandardMaterial({ color: 0x00ccaa, emissive: 0x00ffaa, emissiveIntensity: 0.8 });
        const codeRing = new THREE.Mesh(codeRingGeo, codeRingMat);
        braceletGroup.add(codeRing);
        
        // === ГОЛОГРАМА (залишаємо без змін) ===
        const videoTexture = new THREE.VideoTexture();
        const hologramVideo = document.createElement('video');
        hologramVideo.setAttribute('loop', '');
        hologramVideo.setAttribute('playsinline', '');
        hologramVideo.muted = true;
        // ⚠️ ЗАМІНІТЬ ШЛЯХ, ЯКЩО ВІДЕО ВІДСУТНЄ. ТЕСТОВЕ: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'
        hologramVideo.src = 'assets/video/guide_hologram.mp4';
        hologramVideo.load();
        videoTexture.image = hologramVideo;
        
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const fragmentShader = `
            uniform sampler2D uVideo;
            uniform float uTime;
            varying vec2 vUv;
            void main() {
                vec4 color = texture2D(uVideo, vUv);
                float chromaKey = 0.0;
                float r = color.r;
                float g = color.g;
                float b = color.b;
                if (g > 0.3 && r < 0.4 && b < 0.4) chromaKey = 1.0;
                float alpha = 1.0 - chromaKey;
                float noise = fract(sin(vUv.x * 500.0 + vUv.y * 300.0 + uTime) * 43758.5453);
                vec3 hologramColor = vec3(0.2, 0.9, 0.2);
                vec3 finalColor = mix(color.rgb, hologramColor, 0.5);
                finalColor += noise * 0.2;
                float scanline = sin(vUv.y * 400.0 + uTime * 5.0) * 0.15;
                finalColor += scanline;
                gl_FragColor = vec4(finalColor, alpha * 0.85);
            }
        `;
        const videoMaterial = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTexture }, uTime: { value: 0 } },
            vertexShader, fragmentShader, transparent: true, side: THREE.DoubleSide
        });
        const planeGeo = new THREE.PlaneGeometry(CONFIG.hologramScale, CONFIG.hologramScale * 0.75);
        const hologramPlane = new THREE.Mesh(planeGeo, videoMaterial);
        hologramPlane.position.y = CONFIG.hologramOffsetY;
        braceletGroup.add(hologramPlane);
        
        hologramVideo.addEventListener('canplay', () => {
            if (hologramVideo.videoWidth && hologramVideo.videoHeight) {
                const aspect = hologramVideo.videoWidth / hologramVideo.videoHeight;
                const newWidth = CONFIG.hologramScale;
                const newHeight = newWidth / aspect;
                hologramPlane.scale.set(newWidth / planeGeo.parameters.width, newHeight / planeGeo.parameters.height, 1);
            }
            hologramVideo.play().catch(e => console.log);
        });
        
        // === РОЗПІЗНАВАННЯ РУКИ (MediaPipe) ===
        let handLandmarker;
        let isFist = false;
        
        async function initHandTracking() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
        }
        
        function detectFist(landmarks) {
            if (!landmarks) return false;
            const fingers = [8, 12, 16, 20];
            let curled = 0;
            for (let tip of fingers) {
                if (landmarks[tip].y > landmarks[tip-2].y + 0.02) curled++;
            }
            return curled >= 3;
        }
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoEl.srcObject = stream;
                await videoEl.play();
                loadingDiv.style.display = 'none';
            } catch (err) {
                document.getElementById('gesture-status').innerHTML = '❌ ПОМИЛКА КАМЕРИ. ДОЗВОЛЬТЕ ДОСТУП.';
                loadingDiv.innerHTML = '<div>❌ НЕ ВДАЛОСЯ ЗАПУСТИТИ КАМЕРУ</div>';
            }
        }
        
        function detectLoop() {
            if (!handLandmarker || videoEl.readyState < 2 || !videoEl.videoWidth) {
                requestAnimationFrame(detectLoop);
                return;
            }
            const results = handLandmarker.detectForVideo(videoEl, performance.now());
            const statusDiv = document.getElementById('gesture-status');
            if (results.landmarks && results.landmarks.length > 0) {
                const landmarks = results.landmarks[0];
                const fistNow = detectFist(landmarks);
                if (fistNow !== isFist) {
                    isFist = fistNow;
                    if (isFist) {
                        statusDiv.innerHTML = '✊ КУЛАК АКТИВОВАНО | НЕОН-БРАСЛЕТ + ГОЛОГРАМА ✨';
                        braceletGroup.visible = true;
                        hologramPlane.visible = true;
                        if (navigator.vibrate) navigator.vibrate(100);
                        if (hologramVideo.paused) hologramVideo.play().catch(e=>console.log);
                    } else {
                        statusDiv.innerHTML = '👋 РОЗТИСНИ КУЛАК – БРАСЛЕТ ЗНИКНЕ';
                        braceletGroup.visible = false;
                        hologramPlane.visible = false;
                        hologramVideo.pause();
                    }
                }
                if (isFist && braceletGroup.visible) {
                    const wrist = landmarks[0];
                    const x = (wrist.x - 0.5) * 4.5;
                    const y = (0.5 - wrist.y) * 3.2 + CONFIG.handOffsetY;
                    const z = (wrist.z || 0) * 1.5 + CONFIG.handOffsetZ;
                    braceletGroup.position.x += (x - braceletGroup.position.x) * 0.6;
                    braceletGroup.position.y += (y - braceletGroup.position.y) * 0.6;
                    braceletGroup.position.z = z;
                }
            } else {
                if (isFist) statusDiv.innerHTML = '🖐️ РУКА ЗНИКЛА. ПОКАЖІТЬ ЗНОВУ.';
            }
            requestAnimationFrame(detectLoop);
        }
        
        // === АНІМАЦІЯ НЕОНУ ТА МАТРИЦІ ===
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            if (braceletGroup.visible) {
                // Обертання основного кільця
                ring.rotation.y += CONFIG.rotationSpeed;
                glowRing.rotation.y -= CONFIG.rotationSpeed * 0.7;
                codeRing.rotation.z += 0.01;
                codeRing.rotation.x = Math.sin(now) * 0.2;
                // Обертання символів навколо
                symbolGroup.rotation.y += 0.02;
                symbolGroup.rotation.x = Math.sin(now * 1.5) * 0.1;
                // Пульсація світла
                const intensity = 0.9 + Math.sin(now * 8) * 0.5;
                neonLight.intensity = intensity;
                ringMat.emissiveIntensity = 0.8 + Math.sin(now * 5) * 0.4;
                glowRingMat.emissiveIntensity = 0.7 + Math.sin(now * 6) * 0.5;
                // Анімація матричних частинок (падають)
                matrixParticles.forEach(p => {
                    p.userData.yOffset += p.userData.speedY;
                    if (p.userData.yOffset > 0.35) p.userData.yOffset = -0.25;
                    const y = p.userData.yOffset;
                    const rad = p.userData.radius;
                    const ang = p.userData.angle + now * 0.5;
                    p.position.x = Math.cos(ang) * rad;
                    p.position.z = Math.sin(ang) * rad;
                    p.position.y = y;
                    // Змінюємо прозорість
                    p.material.opacity = 0.3 + Math.sin(now * 3) * 0.2;
                });
            }
            if (hologramPlane.visible && videoMaterial.uniforms) {
                videoMaterial.uniforms.uTime.value = now;
                if (videoTexture.image && videoTexture.image.readyState >= 2) videoTexture.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }
        
        // === КНОПКИ ===
        document.getElementById('reset-btn').addEventListener('click', () => {
            isFist = false;
            braceletGroup.visible = false;
            hologramPlane.visible = false;
            hologramVideo.pause();
            document.getElementById('gesture-status').innerHTML = '👋 СКИНУТО. ПОКАЖИ ДОЛОНЮ → СТИСНИ КУЛАК';
        });
        
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.addEventListener('click', () => {
            hologramVideo.muted = !hologramVideo.muted;
            soundBtn.innerHTML = hologramVideo.muted ? '🔇 ЗВУК' : '🔊 ЗВУК';
        });
        
        // === ЗАПУСК ===
        async function init() {
            await initHandTracking();
            await startCamera();
            braceletGroup.visible = false;
            hologramPlane.visible = false;
            animate();
            detectLoop();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        init().catch(console.error);
    </script>
</body>
</html>
