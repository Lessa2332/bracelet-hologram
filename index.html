
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | ФІНАЛ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 10px; z-index: 100;
            color: #0f0; text-align: center; font-size: 14px;
            border: 1px solid #0f0;
        }
        #status { color: #ffdd88; margin-bottom: 5px; }
        button {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); border: 2px solid #0f0; color: #0f0;
            padding: 8px 16px; border-radius: 40px; cursor: pointer; z-index: 200;
            font-weight: bold;
        }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            color: #0f0; font-size: 1.2rem;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #errorBox {
            position: absolute; bottom: 80px; left: 20px; right: 20px;
            background: rgba(255,0,0,0.8); color: white; padding: 10px;
            border-radius: 10px; font-size: 12px; display: none; z-index: 1100;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="loading">
        <div class="spinner"></div>
        <div>ЗАВАНТАЖЕННЯ МАТРИЦІ...</div>
        <div id="errorBox"></div>
    </div>
    <div id="ui">
        <div id="status">👋 Шукаю руку...</div>
        <div>✊ Стисни кулак → активувати голограму</div>
    </div>
    <button id="reset">⟳ Скинути</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        // ---- ВІДЛАДКА ----
        const errorBox = document.getElementById('errorBox');
        function showError(msg) {
            errorBox.style.display = 'block';
            errorBox.innerHTML += `⚠️ ${msg}<br>`;
            console.error(msg);
            document.querySelector('#loading div:first-child + div').innerHTML = 'ПОМИЛКА: ' + msg;
        }
        window.onerror = (msg) => showError(msg);
        window.onunhandledrejection = (e) => showError(e.reason?.message || String(e.reason));

        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        // === НАЛАШТУВАННЯ (згідно з вашим аналізом) ===
        const CONFIG = {
            braceletBaseRadius: 0.18,
            braceletTube: 0.028,
            handOffsetY: 0.02,
            hologramOffsetY: 0.22,
            hologramScale: 0.9,
            rotationSpeed: 0.02,
            glowIdle: 0.3,        // базове світіння (неактивний стан)
            glowActive: 1.5       // яскраве світіння (активована голограма)
        };

        // DOM елементи
        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingDiv = document.getElementById('loading');
        const statusDiv = document.getElementById('status');

        // ---- Three.js сцена (камера наближена) ----
        const scene = new THREE.Scene();
        scene.background = null;
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.2);   // ближче → об'єкти більші
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);

        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);

        // ---- БРАСЛЕТ: ДУГА (тільки передня частина) замість повного кола ----
        const ringGeo = new THREE.TorusGeometry(
            CONFIG.braceletBaseRadius, 
            CONFIG.braceletTube, 
            64, 
            72,               // менше сегментів
            Math.PI * 0.7     // дуга ~126° — тільки видимий фронт
        );
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88, 
            emissive: 0x44ff88, 
            emissiveIntensity: CONFIG.glowIdle,
            metalness: 0.8,
            transparent: true,
            opacity: 0.95,
            depthWrite: false        // ключове: не перекриває відео в Z-буфері
        });
        const mainRing = new THREE.Mesh(ringGeo, ringMat);
        braceletGroup.add(mainRing);

        // Зовнішнє тонке кільце (теж дуга)
        const outerRingGeo = new THREE.TorusGeometry(
            CONFIG.braceletBaseRadius + 0.012, 
            0.008, 
            64, 
            72, 
            Math.PI * 0.7
        );
        const outerRingMat = new THREE.MeshStandardMaterial({ 
            color: 0x88ffaa, 
            emissive: 0x88ff88, 
            emissiveIntensity: 0.6, 
            transparent: true, 
            opacity: 0.9, 
            depthWrite: false 
        });
        const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
        braceletGroup.add(outerRing);

        // Символи (тільки на передній дузі)
        const symbolsGroup = new THREE.Group();
        braceletGroup.add(symbolsGroup);
        const ukrSymbols = ['Є', 'Ї', 'Ґ', 'Щ', 'К', 'О', 'Д', '0', '1', '#', '{', '}', '⚡', '∇'];
        function makeSprite(char, color='#0f0') {
            const c = document.createElement('canvas'); c.width = 96; c.height = 96;
            const ctx = c.getContext('2d');
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,96,96);
            ctx.font = 'bold 64px "Courier New"';
            ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(char, 48, 48);
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending, transparent: true });
            return new THREE.Sprite(mat);
        }
        const symbolCount = 10;
        const symbolRadius = CONFIG.braceletBaseRadius + 0.05;
        for (let i = 0; i < symbolCount; i++) {
            const sprite = makeSprite(ukrSymbols[i % ukrSymbols.length], '#88ff88');
            const angle = -Math.PI/2 + (i / symbolCount) * Math.PI * 0.9; // тільки передній півколо
            sprite.position.set(Math.cos(angle) * symbolRadius, 0, Math.sin(angle) * symbolRadius);
            sprite.scale.set(0.07, 0.07, 1);
            symbolsGroup.add(sprite);
        }

        const pointLight = new THREE.PointLight(0x44ff88, CONFIG.glowIdle, 2);
        braceletGroup.add(pointLight);

        // ---- ГОЛОГРАМА (збільшена) ----
        const hologramGroup = new THREE.Group();
        braceletGroup.add(hologramGroup);
        const canvasTex = document.createElement('canvas'); canvasTex.width = 512; canvasTex.height = 512;
        const ctxTex = canvasTex.getContext('2d');
        const hologramTexture = new THREE.CanvasTexture(canvasTex);
        const hologramPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(CONFIG.hologramScale, CONFIG.hologramScale * 0.75),
            new THREE.MeshStandardMaterial({ map: hologramTexture, emissive: 0x22aa22, emissiveIntensity: 0.7, transparent: true, side: THREE.DoubleSide })
        );
        hologramPlane.position.y = CONFIG.hologramOffsetY;
        hologramGroup.add(hologramPlane);
        
        function updateHologramTexture(time) {
            ctxTex.fillStyle = '#001100';
            ctxTex.fillRect(0, 0, canvasTex.width, canvasTex.height);
            ctxTex.font = `bold ${Math.floor(canvasTex.width * 0.1)}px "Courier New"`;
            ctxTex.fillStyle = '#0f0';
            ctxTex.shadowBlur = 10;
            ctxTex.shadowColor = '#0f0';
            ctxTex.textAlign = 'center';
            ctxTex.fillText('⚡ ГОЛОГРАМА ⚡', canvasTex.width/2, canvasTex.height/2 - 50);
            ctxTex.font = `${Math.floor(canvasTex.width * 0.07)}px monospace`;
            ctxTex.fillStyle = '#8f8';
            ctxTex.fillText('АКТИВОВАНО', canvasTex.width/2, canvasTex.height/2 + 50);
            for (let i = 0; i < 50; i++) {
                ctxTex.fillStyle = `rgba(0,255,0,${Math.random() * 0.6})`;
                ctxTex.fillRect(Math.random() * canvasTex.width, Math.random() * canvasTex.height, 3, 3);
            }
            hologramTexture.needsUpdate = true;
        }
        hologramGroup.visible = false;

        // ---- РОЗПІЗНАВАННЯ РУКИ (MediaPipe) ----
        let handLandmarker = null;
        let isHandVisible = false;

        async function initMediaPipe() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                return true;
            } catch(e) { showError("MediaPipe: " + e.message); return false; }
        }

        function getWristWidth(landmarks) {
            const p0 = landmarks[0];
            const p17 = landmarks[17];
            const dx = p0.x - p17.x;
            const dy = p0.y - p17.y;
            const dz = (p0.z || 0) - (p17.z || 0);
            return Math.sqrt(dx*dx + dy*dy + dz*dz) * 5.5;
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } });
                videoEl.srcObject = stream;
                await videoEl.play();
                // Коригуємо камеру під реальні пропорції відео
                videoEl.onloadedmetadata = () => {
                    const aspect = videoEl.videoWidth / videoEl.videoHeight;
                    camera.aspect = aspect;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                return true;
            } catch(e) { showError("Камера: " + e.message); return false; }
        }

        function detectionLoop() {
            if (!handLandmarker || videoEl.readyState < 2 || !videoEl.videoWidth) {
                requestAnimationFrame(detectionLoop);
                return;
            }
            try {
                const results = handLandmarker.detectForVideo(videoEl, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    const lm = results.landmarks[0];
                    isHandVisible = true;
                    statusDiv.innerHTML = '🖐️ Рука виявлена! Браслет активовано.';
                    
                    const wristCenter = {
                        x: (lm[0].x + lm[17].x) / 2,
                        y: (lm[0].y + lm[17].y) / 2,
                        z: ((lm[0].z || 0) + (lm[17].z || 0)) / 2
                    };
                    // ЗМЕНШЕНІ МНОЖНИКИ (згідно з вашим аналізом)
                    const targetX = (wristCenter.x - 0.5) * 2.6;
                    const targetY = (0.5 - wristCenter.y) * 2.0 + CONFIG.handOffsetY;
                    const targetZ = (wristCenter.z || 0) * 0.6 + 0.08;
                    
                    // Плавне слідування (менший коефіцієнт = менше "дрожання")
                    braceletGroup.position.x += (targetX - braceletGroup.position.x) * 0.12;
                    braceletGroup.position.y += (targetY - braceletGroup.position.y) * 0.12;
                    braceletGroup.position.z = targetZ;
                    
                    const width = getWristWidth(lm);
                    let scaleFactor = width / CONFIG.braceletBaseRadius;
                    scaleFactor = Math.min(Math.max(scaleFactor, 0.7), 1.5);
                    mainRing.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    outerRing.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    symbolsGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    
                    // Визначення кулака
                    const fingers = [8,12,16,20];
                    let curled = 0;
                    for (let tip of fingers) if (lm[tip].y > lm[tip-2].y + 0.02) curled++;
                    const isFist = curled >= 3;
                    
                    if (isFist && !hologramGroup.visible) {
                        hologramGroup.visible = true;
                        statusDiv.innerHTML += ' | ✊ ГОЛОГРАМА АКТИВОВАНА';
                        if (navigator.vibrate) navigator.vibrate(100);
                    } else if (!isFist && hologramGroup.visible) {
                        hologramGroup.visible = false;
                        statusDiv.innerHTML = '🖐️ Рука виявлена! Браслет активовано.';
                    }
                    
                    braceletGroup.visible = true;
                } else {
                    if (isHandVisible) {
                        isHandVisible = false;
                        statusDiv.innerHTML = '👋 Рука зникла...';
                        braceletGroup.visible = false;
                        hologramGroup.visible = false;
                    }
                }
            } catch(e) { showError("detectLoop: " + e.message); }
            requestAnimationFrame(detectionLoop);
        }

        // Анімація з динамічним світінням (замість постійного sine)
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            if (braceletGroup.visible) {
                mainRing.rotation.y += CONFIG.rotationSpeed;
                outerRing.rotation.y -= CONFIG.rotationSpeed * 0.8;
                symbolsGroup.rotation.y += 0.015;
                symbolsGroup.rotation.x = Math.sin(now) * 0.1;
                
                // Плавне перемикання світіння залежно від активності голограми
                const targetGlow = hologramGroup.visible ? CONFIG.glowActive : CONFIG.glowIdle;
                ringMat.emissiveIntensity += (targetGlow - ringMat.emissiveIntensity) * 0.08;
                pointLight.intensity = ringMat.emissiveIntensity * 0.9;
                
                if (hologramGroup.visible) updateHologramTexture(now);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('reset').onclick = () => {
            isHandVisible = false;
            braceletGroup.visible = false;
            hologramGroup.visible = false;
            statusDiv.innerHTML = '👋 Скинуто. Покажіть руку.';
        };

        async function init() {
            const mediapipeOk = await initMediaPipe();
            const cameraOk = await startCamera();
            if (mediapipeOk && cameraOk) {
                braceletGroup.visible = false;
                animate();
                detectionLoop();
                loadingDiv.style.display = 'none';
            } else {
                showError("Не вдалося ініціалізувати камеру або MediaPipe.");
            }
        }
        init();
    </script>
</body>
</html>
